<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舰船文件库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .search-container {
            max-width: 800px;
            margin: 0 auto;
        }

        #search-input {
            width: 100%;
            height: 50px;
            padding: 0 20px;
            background-color: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #search-input:focus {
            border-color: #ffffff;
        }

        .result-container {
            margin-top: 30px;
            width: 100%;
        }

        .file-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            background-color: #1a1a1a;
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .file-item:hover {
            background-color: #2d2d2d;
        }

        .no-result {
            color: #666666;
            text-align: center;
            font-size: 18px;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="输入关键词搜索文件...">
        <div class="result-container" id="result-container"></div>
    </div>

    <script>
        const fileList = [
            { name: "PA3190.d2", url: "./docs/voice/PA3190" }
        ];

        const searchInput = document.getElementById('search-input');
        const resultContainer = document.getElementById('result-container');

        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim().toLowerCase();
            resultContainer.innerHTML = '';

            if (!keyword) return;

            const matchFiles = fileList.filter(file => {
                const fileNameMain = file.name.split('.')[0].toLowerCase();
                return fileNameMain === keyword;
            });

            if (matchFiles.length > 0) {
                matchFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.textContent = file.name;
                    div.addEventListener('click', () => {
                        window.location.href = file.url;
                    });
                    resultContainer.appendChild(div);
                });
            } else {
                resultContainer.innerHTML = '<div class="no-result">No Data.</div>';
            }
        });
    </script>
</body>
</html>
